<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BFHL Tree Visualizer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 40px 20px;
    }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: 6px;
      color: #38bdf8;
    }

    p.subtitle {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 30px;
      font-size: 0.9rem;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
    }

    textarea {
      width: 100%;
      height: 130px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 14px;
      color: #e2e8f0;
      font-size: 0.95rem;
      resize: vertical;
      outline: none;
    }

    textarea:focus { border-color: #38bdf8; }

    .hint {
      font-size: 0.78rem;
      color: #64748b;
      margin-top: 6px;
      margin-bottom: 14px;
    }

    button {
      display: block;
      width: 100%;
      padding: 13px;
      background: #38bdf8;
      color: #0f172a;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #7dd3fc; }
    button:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

    .error {
      margin-top: 18px;
      background: #450a0a;
      border: 1px solid #ef4444;
      color: #fca5a5;
      padding: 12px 16px;
      border-radius: 8px;
    }

    .section {
      margin-top: 28px;
    }

    .section h2 {
      font-size: 1rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
      border-bottom: 1px solid #1e293b;
      padding-bottom: 6px;
    }

    /* Summary cards */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .card {
      background: #1e293b;
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }

    .card .val {
      font-size: 2rem;
      font-weight: 700;
      color: #38bdf8;
    }

    .card .label {
      font-size: 0.78rem;
      color: #64748b;
      margin-top: 4px;
    }

    /* Hierarchy cards */
    .hier-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
    }

    .hier-card {
      background: #1e293b;
      border-radius: 10px;
      padding: 16px;
      border-left: 4px solid #38bdf8;
    }

    .hier-card.cycle { border-left-color: #f97316; }

    .hier-card .root-label {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .hier-card .badge {
      display: inline-block;
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 99px;
      margin-bottom: 10px;
      background: #0f172a;
      color: #38bdf8;
    }

    .hier-card.cycle .badge { color: #f97316; }

    .tree-view {
      font-family: monospace;
      font-size: 0.85rem;
      color: #cbd5e1;
      white-space: pre;
      line-height: 1.6;
    }

    /* Tags */
    .tags { display: flex; flex-wrap: wrap; gap: 8px; }

    .tag {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.82rem;
      font-family: monospace;
      color: #fbbf24;
    }

    .tag.invalid { color: #f87171; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌲 BFHL Tree Visualizer</h1>
    <p class="subtitle">Enter node edges and explore the hierarchy</p>

    <textarea id="input" placeholder='Enter edges separated by commas or newlines&#10;e.g. A->B, A->C, B->D, X->Y, Y->Z, Z->X'></textarea>
    <p class="hint">Separate edges with commas or new lines. Example: A->B, B->C, X->Y</p>

    <button id="btn" onclick="submitData()">Analyse Hierarchy</button>

    <div id="error" class="error" style="display:none"></div>
    <div id="results"></div>
  </div>

  <script>
    function renderTree(obj, prefix = "", isLast = true) {
      let result = "";
      const keys = Object.keys(obj);
      keys.forEach((key, i) => {
        const last = i === keys.length - 1;
        result += prefix + (isLast ? "└── " : "├── ") + key + "\n";
        result += renderTree(obj[key], prefix + (isLast ? "    " : "│   "), last);
      });
      return result;
    }

    async function submitData() {
      const raw = document.getElementById("input").value.trim();
      if (!raw) return;

      const btn = document.getElementById("btn");
      btn.disabled = true;
      btn.textContent = "Processing...";
      document.getElementById("error").style.display = "none";
      document.getElementById("results").innerHTML = "";

      const data = raw.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);

      try {
        const res = await fetch("http://localhost:3000/bfhl", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ data })
        });

        if (!res.ok) throw new Error("Server error: " + res.status);
        const json = await res.json();
        renderResults(json);
      } catch (err) {
        const el = document.getElementById("error");
        el.style.display = "block";
        el.textContent = "❌ API call failed: " + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = "Analyse Hierarchy";
      }
    }

    function renderResults(d) {
      const s = d.summary;
      let html = `
        <div class="section">
          <h2>Summary</h2>
          <div class="summary-grid">
            <div class="card"><div class="val">${s.total_trees}</div><div class="label">Valid Trees</div></div>
            <div class="card"><div class="val">${s.total_cycles}</div><div class="label">Cyclic Groups</div></div>
            <div class="card"><div class="val">${s.largest_tree_root || "—"}</div><div class="label">Deepest Tree Root</div></div>
          </div>
        </div>

        <div class="section">
          <h2>Hierarchies</h2>
          <div class="hier-grid">
      `;

      for (const h of d.hierarchies) {
        const isCycle = !!h.has_cycle;
        let treeStr = "";
        if (!isCycle) {
          treeStr += h.root + "\n";
          treeStr += renderTree(h.tree[h.root] || {}, "", true);
        }

        html += `
          <div class="hier-card ${isCycle ? "cycle" : ""}">
            <div class="root-label">Root: ${h.root}</div>
            <span class="badge">${isCycle ? "⚠ Cyclic" : `Depth: ${h.depth}`}</span>
            ${isCycle
              ? `<div style="color:#f97316;font-size:0.82rem;">Cycle detected — no tree structure</div>`
              : `<div class="tree-view">${treeStr.trim()}</div>`
            }
          </div>
        `;
      }

      html += `</div></div>`;

      if (d.invalid_entries.length > 0) {
        html += `<div class="section"><h2>Invalid Entries</h2><div class="tags">`;
        for (const e of d.invalid_entries) html += `<span class="tag invalid">${e}</span>`;
        html += `</div></div>`;
      }

      if (d.duplicate_edges.length > 0) {
        html += `<div class="section"><h2>Duplicate Edges</h2><div class="tags">`;
        for (const e of d.duplicate_edges) html += `<span class="tag">${e}</span>`;
        html += `</div></div>`;
      }

      document.getElementById("results").innerHTML = html;
    }
  </script>
</body>
</html>
